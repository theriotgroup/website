            padding: 0 1rem 2rem 1rem;

        .media-item:hover {

            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);

        .media-item img,
        .media-item video {
            width: 100%;
            height: auto;
            display: block;
        }

        .media-item video {
            background: #000;
        }

        @media (max-width: 768px) {
            .media-grid {

                padding: 0 0.75rem 2rem 0.75rem;
