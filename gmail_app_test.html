<!DOCTYPE html>
<html>
<head>
    <title>Gmail App Link Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            font-family: Arial, sans-serif; 
            padding: 20px; 
            background: #1a1a1a; 
            color: white; 
        }
        .test-button {
            background: #3498db;
            color: white;
            border: none;
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
            display: block;
            width: 100%;
            max-width: 300px;
        }
        .test-button:hover { background: #2980b9; }
        .info { 
            background: #333; 
            padding: 15px; 
            border-radius: 8px; 
            margin: 20px 0; 
        }
        .platform { 
            color: #3498db; 
            font-weight: bold; 
        }
    </style>
</head>
<body>
    <h1>📧 Gmail App Link Test</h1>
    
    <div class="info">
        <strong>Detected Platform:</strong> <span class="platform" id="platform">--</span><br>
        <strong>User Agent:</strong> <span id="useragent">--</span>
    </div>
    
    <button class="test-button" onclick="testGmailApp()">📱 Test Gmail App Opening</button>
    <button class="test-button" onclick="testWebGmail()">🌐 Test Web Gmail (Fallback)</button>
    
    <div class="info">
        <h3>How it works:</h3>
        <ul>
            <li><strong>iOS:</strong> Uses <code>googlegmail://</code> URL scheme</li>
            <li><strong>Android:</strong> Uses intent URL with automatic fallback</li>
            <li><strong>Desktop:</strong> Opens web Gmail in new tab</li>
            <li><strong>Fallback:</strong> If app not installed, opens web Gmail</li>
        </ul>
    </div>
    
    <div id="testResult"></div>

    <script>
        // Platform detection
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
        const isAndroid = /Android/.test(navigator.userAgent);
        const isMobile = isIOS || isAndroid;
        
        // Display platform info
        document.getElementById('useragent').textContent = navigator.userAgent;
        
        let platform = 'Desktop';
        if (isIOS) platform = 'iOS Mobile';
        if (isAndroid) platform = 'Android Mobile';
        document.getElementById('platform').textContent = platform;
        
        function showResult(message, type = 'info') {
            const result = document.getElementById('testResult');
            result.innerHTML = `<div style="background: ${type === 'success' ? '#27ae60' : '#3498db'}; padding: 10px; border-radius: 4px; margin: 10px 0;">${message}</div>`;
        }
        
        function testGmailApp() {
            const webGmailUrl = 'https://mail.google.com/mail/u/0/#inbox';
            
            if (isMobile) {
                let appUrl;
                
                if (isIOS) {
                    appUrl = 'googlegmail://';
                } else if (isAndroid) {
                    appUrl = 'intent://mail.google.com/mail/#Intent;scheme=https;package=com.google.android.gm;S.browser_fallback_url=' + 
                             encodeURIComponent(webGmailUrl) + ';end';
                }
                
                if (appUrl) {
                    showResult(`🚀 Attempting to open Gmail app on ${platform}...`, 'info');
                    
                    if (isAndroid) {
                        window.location = appUrl;
                    } else {
                        // iOS fallback detection
                        const startTime = Date.now();
                        window.location = appUrl;
                        
                        setTimeout(() => {
                            const timeElapsed = Date.now() - startTime;
                            if (timeElapsed < 1000) {
                                showResult(`📧 Gmail app not found - opening in browser`, 'info');
                                window.open(webGmailUrl, '_blank');
                            }
                        }, 1500);
                    }
                }
            } else {
                showResult(`💻 Desktop detected - opening web Gmail`, 'info');
                window.open(webGmailUrl, '_blank');
            }
        }
        
        function testWebGmail() {
            showResult(`🌐 Opening web Gmail (fallback test)`, 'success');
            window.open('https://mail.google.com/mail/u/0/#inbox', '_blank');
        }
    </script>
</body>
</html>
